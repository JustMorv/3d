<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blender Style Compass | Room Editor</title>
  <style>
    /* ----- RESET & BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'BlinkMacSystemFont', 'Roboto', sans-serif;
      background: #111214;
    }

    /* ----- MAIN MENU ----- */
    #main-menu {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(28, 30, 36, 0.92);
      backdrop-filter: blur(18px);
      padding: 18px;
      width: 280px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
      max-height: 85vh;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    #main-menu::-webkit-scrollbar {
      width: 5px;
    }
    #main-menu::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }
    #main-menu::-webkit-scrollbar-thumb {
      background: #4a6ee0;
      border-radius: 10px;
    }

    .menu-title {
      font-size: 1.35rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e0e4ff, #a0b4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(74, 110, 224, 0.4);
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title {
      margin: 20px 0 10px 0;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9aa4bf;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 6px 4px;
      transition: color 0.2s;
      border-radius: 8px;
    }
    .section-title:hover {
      color: white;
    }
    .arrow {
      font-size: 12px;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      color: #4a6ee0;
    }
    .section-title.expanded .arrow {
      transform: rotate(180deg);
    }
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease-out;
    }
    .accordion-content.expanded {
      max-height: 550px;
      transition: max-height 0.4s ease-in;
    }
    #main-menu button {
      width: 100%;
      padding: 10px 14px;
      margin: 6px 0;
      background: rgba(20, 22, 27, 0.8);
      border: 1px solid rgba(74, 110, 224, 0.3);
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.85rem;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #eef2ff;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }
    #main-menu button:hover {
      background: #4a6ee0;
      border-color: #ffffff80;
      transform: translateX(4px) scale(1.01);
      box-shadow: 0 8px 18px rgba(74, 110, 224, 0.35);
      color: white;
    }
    button i {
      font-style: normal;
      font-size: 1.2rem;
      width: 26px;
      text-align: center;
    }

    /* ----- BLENDER-STYLE COMPASS (исправленный, с сохранением старых классов для логики) ----- */
    #blender-compass {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 2000;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
    }

    .compass-container {
      position: relative;
      width: 130px;
      height: 130px;
      background: rgba(18, 20, 24, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.1s ease;
    }

    .compass-axes {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Общие стили для осей (сохраняем старые классы .axis, .axis-x, .axis-y, .axis-z) */
    .axis {
      position: absolute;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.9;
    }
    .axis:hover {
      transform: scale(1.2);
      opacity: 1;
    }

    /* X ось (красная) */
    .axis-x {
      width: 50px;
      height: 4px;
      background: #ff5e5e;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 5px #ff5e5eaa;
    }
    .axis-x.left {
      left: 0;
    }
    .axis-x.right {
      right: 0;
    }
    .axis-x::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
      background: #ff5e5e;
      box-shadow: 0 0 6px #ff5e5e;
    }
    .axis-x.left::after {
      right: -6px;
    }
    .axis-x.right::after {
      left: -6px;
    }

    /* Y ось (зелёная) */
    .axis-y {
      width: 4px;
      height: 50px;
      background: #5eff8c;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 5px #5eff8caa;
    }
    .axis-y.front {
      top: 0;
    }
    .axis-y.back {
      bottom: 0;
    }
    .axis-y::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      left: 50%;
      transform: translateX(-50%);
      background: #5eff8c;
      box-shadow: 0 0 6px #5eff8c;
    }
    .axis-y.front::after {
      bottom: -6px;
    }
    .axis-y.back::after {
      top: -6px;
    }

    /* Z ось (синяя — диагональ) */
    .axis-z {
      width: 4px;
      height: 40px;
      background: #5aa9ff;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      box-shadow: 0 0 5px #5aa9ffaa;
    }
    .axis-z.top {
      top: 10px;
    }
    .axis-z.bottom {
      bottom: 10px;
    }
    .axis-z::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      left: 50%;
      transform: translateX(-50%);
      background: #5aa9ff;
      box-shadow: 0 0 6px #5aa9ff;
    }
    .axis-z.top::after {
      bottom: -6px;
    }
    .axis-z.bottom::after {
      top: -6px;
    }

    /* Центр компаса */
    .axis-center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 22px;
      height: 22px;
      background: radial-gradient(circle at 30% 30%, #ffffff, #b0b8d0);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      color: #2c3e50;
    }
    .axis-center:hover {
      transform: translate(-50%, -50%) scale(1.15);
      background: radial-gradient(circle at 30% 30%, #ffffff, #4a6ee0);
      color: white;
      box-shadow: 0 0 12px #4a6ee0;
    }
    .axis-center:active {
      transform: translate(-50%, -50%) scale(0.98);
    }

    /* Текстовые подписи для красоты (не ломают логику) */
    .axis-label {
      position: absolute;
      font-size: 9px;
      font-weight: bold;
      background: rgba(0,0,0,0.55);
      padding: 2px 5px;
      border-radius: 12px;
      color: #ddd;
      pointer-events: none;
      backdrop-filter: blur(2px);
      font-family: monospace;
    }
    .label-x-left { left: -5px; top: 50%; transform: translateY(-50%) translateX(-100%); }
    .label-x-right { right: -5px; top: 50%; transform: translateY(-50%) translateX(100%); }
    .label-y-front { top: -8px; left: 50%; transform: translateX(-50%) translateY(-100%); }
    .label-y-back { bottom: -8px; left: 50%; transform: translateX(-50%) translateY(100%); }
    .label-z-top { top: -5px; right: -5px; transform: translate(30%, -30%); }
    .label-z-bottom { bottom: -5px; left: -5px; transform: translate(-30%, 30%); }

    /* Контекстное меню */
    #context-menu {
      position: fixed;
      background: rgba(24, 26, 32, 0.96);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      padding: 10px;
      min-width: 210px;
      z-index: 3000;
      display: none;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #context-menu .menu-item {
      padding: 10px 16px;
      cursor: pointer;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #eef2ff;
      transition: 0.15s;
    }
    #context-menu .menu-item:hover {
      background: #4a6ee0;
      color: white;
    }
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 8px 0;
    }

    .compass-container:hover {
      transform: scale(1.02);
      transition: transform 0.2s;
    }
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

<!-- Главное меню -->
<div id="main-menu">
  <div class="menu-title">🏠 3D Редактор кухни</div>
  
  <!-- МОДЕЛИ -->
  <div class="section-title" onclick="window.app?.uiManager?.toggleAccordion('models-accordion')">
    <span>🎨 3D Модели кухни</span>
    <span class="arrow">▼</span>
  </div>
  <div id="models-accordion" class="accordion-content">
    <button onclick="window.app?.modelLoader?.loadModel('basic_kitchen')"><i>🍽️</i> Базовая кухня</button>
    <button onclick="window.app?.modelLoader?.loadModel('cabinet')"><i>🗄️</i> Кухонный шкаф</button>
    <button onclick="window.app?.modelLoader?.loadModel('kitchen')"><i>🏠</i> Кухня</button>
    <button onclick="window.app?.modelLoader?.loadModel('kitchen1')"><i>🍳</i> Кухня 1</button>
    <button onclick="window.app?.modelLoader?.loadModel('kitchen_cabinets')"><i>🚪</i> Кухонные шкафы</button>
    <button onclick="window.app?.modelLoader?.loadModel('kitchen_model_2')"><i>🍴</i> Кухонная модель 2</button>
    <button onclick="window.app?.modelLoader?.loadModel('modern_kitchen')"><i>🌟</i> Современная кухня</button>
    <button onclick="window.app?.modelLoader?.loadModel('living_room')"><i>🛋️</i> Гостиная</button>
    <button onclick="window.app?.modelLoader?.loadModel('new_kitchen')"><i>🆕</i> Новая кухня</button>
    <button onclick="window.app?.modelLoader?.loadModel('pigan')"><i>🐷</i> Пиган кухня</button>
    <button onclick="window.app?.modelLoader?.loadModel('pobin')"><i>🏡</i> Побин кухня</button>
  </div>

  <!-- УПРАВЛЕНИЕ -->
  <div class="section-title" onclick="window.app?.uiManager?.toggleAccordion('management-accordion')">
    <span>⚙️ Управление</span>
    <span class="arrow">▼</span>
  </div>
  <div id="management-accordion" class="accordion-content">
    <button onclick="window.app?.selectionManager?.deleteSelected()"><i>🗑️</i> Удалить выбранный</button>
    <button onclick="window.app?.modelManager?.clearAllModels()"><i>🔥</i> Удалить все модели</button>
    <button onclick="window.app?.wallManager?.snapToWalls()"><i>🧱</i> Пристыковать все к стенам</button>
    <button onclick="window.app?.selectionManager?.enableWidthMode?.()"><i>📏</i> Изменить ширину</button>
    <button onclick="window.app?.selectionManager?.resetObject()"><i>🔄</i> Сбросить объект</button>
    <button onclick="window.app?.selectionManager?.alignToFloor?.()"><i>⬆️</i> Выровнять по полу</button>
    <button onclick="window.app?.modelManager?.fixAllModelsHeight()"><i>⬆️⬆️</i> Выровнять все объекты</button>
    <button onclick="window.app?.modelManager?.checkAllModelSizes?.()"><i>📊</i> Проверить размеры</button>
    <button onclick="window.app?.modelManager?.normalizeAllModels?.()"><i>⚖️</i> Нормализовать размеры</button>
    <button onclick="window.app?.modelManager?.recenterAllModels?.()"><i>🎯</i> Центрировать все модели</button>
    <button onclick="window.app?.modelManager?.resetAllPositions?.()"><i>🔄</i> Сбросить позиции</button>
    <button onclick="window.app?.modelManager?.forceModelsIntoRoom?.()"><i>🏠</i> Разместить все в комнате</button>
    <button onclick="window.app?.modelManager?.shrinkOversizedModels?.()"><i>📉</i> Уменьшить большие модели</button>
  </div>

  <!-- КОЛЛИЗИИ -->
  <div class="section-title" onclick="window.app?.uiManager?.toggleAccordion('collisions-accordion')">
    <span>🎯 Коллизии</span>
    <span class="arrow">▼</span>
  </div>
  <div id="collisions-accordion" class="accordion-content">
    <button onclick="window.app?.collisionManager?.togglePreciseCollisions?.()" id="collision-toggle">
      <i>🎯</i> <span id="collision-status">Точные столкновения: ВКЛ</span>
    </button>
    <button onclick="window.app?.collisionManager?.showColliders?.()"><i>👁️</i> Показать коллайдеры</button>
    <button onclick="window.app?.collisionManager?.hideColliders?.()"><i>👁️‍🗨️</i> Скрыть коллайдеры</button>
  </div>

  <!-- ИНФОРМАЦИЯ -->
  <div class="section-title" onclick="window.app?.uiManager?.toggleAccordion('info-accordion')">
    <span>📊 Информация</span>
    <span class="arrow">▼</span>
  </div>
  <div id="info-accordion" class="accordion-content">
    <button id="toggle-all-sizes-btn" onclick="window.app?.modelManager?.toggleAllModelsSizes?.()">
      <i>📏</i> <span id="sizes-toggle-text">Показать размеры всех моделей</span>
    </button>
    <button onclick="window.app?.modelManager?.showRoomInfo?.()">
      <i>🏠</i> Информация о комнате
    </button>
  </div>
</div>

<!-- КОМПАС В СТИЛЕ BLENDER (исправлен: сохранены старые классы для совместимости с CameraController) -->
<div id="blender-compass">
  <div class="compass-container">
    <div class="compass-axes">
      <!-- X ось (лево/право) - используем старые классы axis axis-x left/right -->
      <div class="axis axis-x left" onclick="if(window.app?.cameraController) window.app.cameraController.setView('left')" title="Вид слева"></div>
      <div class="axis axis-x right" onclick="if(window.app?.cameraController) window.app.cameraController.setView('right')" title="Вид справа"></div>
      
      <!-- Y ось (вперёд/назад) -->
      <div class="axis axis-y front" onclick="if(window.app?.cameraController) window.app.cameraController.setView('front')" title="Вид спереди"></div>
      <div class="axis axis-y back" onclick="if(window.app?.cameraController) window.app.cameraController.setView('back')" title="Вид сзади"></div>
      
      <!-- Z ось (верх/низ) -->
      <div class="axis axis-z top" onclick="if(window.app?.cameraController) window.app.cameraController.setView('top')" title="Вид сверху"></div>
      <div class="axis axis-z bottom" onclick="if(window.app?.cameraController) window.app.cameraController.setView('bottom')" title="Вид снизу"></div>
      
      <!-- Центр (сброс вида) -->
      <div class="axis-center" onclick="if(window.app?.cameraController) window.app.cameraController.resetView()" title="Сбросить вид">⌗</div>
      
      <!-- Декоративные подписи (не мешают работе) -->
      <div class="axis-label label-x-left">X</div>
      <div class="axis-label label-x-right">X</div>
      <div class="axis-label label-y-front">Y</div>
      <div class="axis-label label-y-back">Y</div>
      <div class="axis-label label-z-top">Z</div>
      <div class="axis-label label-z-bottom">Z</div>
    </div>
  </div>
</div>

<!-- Контекстное меню -->
<div id="context-menu">
  <div class="menu-item" onclick="window.app?.rotationManager?.enableRotationMode()"><i>🔄</i> Повернуть объект</div>
  <div class="menu-item" onclick="window.app?.rotationManager?.resetRotation()"><i>↩️</i> Сбросить вращение</div>
  <div class="divider"></div>
  <div class="menu-item" onclick="window.app?.selectionManager?.cloneObject()"><i>⎘</i> Дублировать</div>
  <div class="menu-item" onclick="window.app?.selectionManager?.deleteSelected()" style="color: #ff8a7a;"><i>🗑️</i> Удалить</div>
</div>

<!-- Библиотеки Three.js -->
<script src="https://unpkg.com/three@0.90.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.90.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.90.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.90.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://unpkg.com/three@0.90.0/examples/js/libs/stats.min.js"></script>

<!-- Модули -->
<script src="modules/Utils/MathHelper.js"></script>
<script src="modules/Utils/DebugHelper.js"></script>
<script src="modules/Utils/EventManager.js"></script>
<script src="modules/Core/SceneManager.js"></script>
<script src="modules/Core/CameraController.js"></script>
<script src="modules/Core/UIManager.js"></script>
<script src="modules/Core/App.js"></script>
<script src="modules/Models/ModelLoader.js"></script>
<script src="modules/Models/ModelManager.js"></script>
<script src="modules/Models/ModelNormalizer.js"></script>
<script src="modules/Physics/CollisionManager.js"></script>
<script src="modules/Physics/CollisionHelper.js"></script>
<script src="modules/Physics/WallManager.js"></script>
<script src="modules/Interactions/DragManager.js"></script>
<script src="modules/Interactions/SelectionManager.js"></script>
<script src="modules/Interactions/RotationManager.js"></script>
<script src="modules/Interactions/ContextMenu.js"></script>
<script src="main.js"></script>

<!-- Скрипт для аккордеонов и совместимости -->
<script>
  (function() {
    if (!window.app) window.app = {};
    if (!window.app.uiManager) {
      window.app.uiManager = {
        toggleAccordion: function(id) {
          const el = document.getElementById(id);
          if (el) {
            el.classList.toggle('expanded');
            const parent = el.previousElementSibling;
            if (parent && parent.classList && parent.classList.contains('section-title')) {
              parent.classList.toggle('expanded');
            }
          }
        }
      };
    }
    window.addEventListener('DOMContentLoaded', () => {
      const accContents = document.querySelectorAll('.accordion-content');
      accContents.forEach(content => {
        content.classList.add('expanded');
        const prev = content.previousElementSibling;
        if (prev && prev.classList.contains('section-title')) prev.classList.add('expanded');
      });
    });
  })();
</script>

</body>
</html>
